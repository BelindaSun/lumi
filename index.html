<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Lumi 小星星</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --sky:#0d0b2e;
  --theme:#1a3d1a;
  --accent:#7de8a0;
  --gold:#ffd700;--warm:#fff4a3;
  --pink:#ff9eb5;--lav:#c3b1e1;
  --white:#fff;--textl:#f0e8ff;
  --green:#5ecf8f;--blue:#5bb8f5;--btnpink:#ff85aa;--btnyellow:#ffc94d;
}
html,body{height:100%;overflow:hidden;}
body{background:var(--sky);font-family:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;color:var(--white);user-select:none;touch-action:manipulation;}

/* ── Stars ── */
.stars-bg{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star-dot{position:absolute;background:white;border-radius:50%;animation:twinkle var(--dur) ease-in-out infinite;animation-delay:var(--delay);}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1)}50%{opacity:1;transform:scale(1.4)}}

/* ── Screens ── */
.screen{display:none;position:fixed;inset:0;z-index:1;flex-direction:column;align-items:center;justify-content:center;padding:env(safe-area-inset-top,16px) 20px env(safe-area-inset-bottom,20px);text-align:center;overflow-y:auto;gap:6px;}
.screen.active{display:flex;}

/* Theme overlay */
.theme-bg{position:fixed;inset:0;z-index:0;opacity:.18;transition:background 1s;pointer-events:none;}

/* ── Lumi ── */
.lumi-wrap{position:relative;flex-shrink:0;}
.lumi-star{line-height:1;display:inline-block;filter:drop-shadow(0 0 20px #ffd700) drop-shadow(0 0 50px #ffa500);animation:lumiFloat 3s ease-in-out infinite;}
.lumi-star.xl{font-size:clamp(80px,20vw,120px);}
.lumi-star.lg{font-size:clamp(60px,15vw,90px);}
.lumi-star.md{font-size:clamp(44px,11vw,64px);}
.glow{position:absolute;inset:-20px;border-radius:50%;background:radial-gradient(circle,rgba(255,215,0,.25) 0%,transparent 70%);animation:glowP 2s ease-in-out infinite;}
@keyframes lumiFloat{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-14px) rotate(5deg)}}
@keyframes glowP{0%,100%{transform:scale(1);opacity:.6}50%{transform:scale(1.25);opacity:1}}

/* ── Scene image ── */
.scene{font-size:clamp(52px,14vw,80px);margin:4px 0;animation:scenePop .4s ease-out;}
@keyframes scenePop{0%{transform:scale(.5);opacity:0}100%{transform:scale(1);opacity:1}}

/* ── Bubble ── */
.bubble{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);border:2px solid rgba(255,215,0,.4);border-radius:22px;padding:14px 20px;margin:4px 0;max-width:min(440px,92vw);font-size:clamp(17px,4.5vw,22px);line-height:1.65;font-weight:500;position:relative;}
.dots{display:inline-flex;gap:5px;vertical-align:middle;}
.dots span{width:8px;height:8px;border-radius:50%;background:var(--gold);animation:dot .8s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.15s;}.dots span:nth-child(3){animation-delay:.3s;}
@keyframes dot{0%,100%{transform:scale(.5);opacity:.4}50%{transform:scale(1);opacity:1}}

/* ── Word card ── */
.word-card{background:rgba(255,255,255,.1);border:3px solid var(--gold);border-radius:24px;padding:16px 28px;margin:8px 0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.word-zh{font-size:clamp(24px,7vw,34px);font-weight:700;}
.word-en{font-size:clamp(28px,8vw,42px);font-weight:800;color:var(--warm);letter-spacing:2px;}
.word-emoji{font-size:clamp(44px,12vw,64px);}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border:none;border-radius:50px;font-size:clamp(17px,4.5vw,22px);font-weight:700;cursor:pointer;margin:5px;font-family:inherit;transition:transform .12s,box-shadow .12s;padding:clamp(13px,3.2vw,18px) clamp(26px,6.5vw,40px);min-width:clamp(130px,38vw,190px);}
.btn:active{transform:translateY(3px);}
.btn.y{background:var(--btnyellow);color:#3a2a00;box-shadow:0 5px 0 #c49000,0 0 26px rgba(255,215,0,.35);}
.btn.g{background:var(--green);color:#0a2e1a;box-shadow:0 5px 0 #3a9060,0 0 26px rgba(94,207,143,.35);}
.btn.b{background:var(--blue);color:#0a1e3a;box-shadow:0 5px 0 #2a6090,0 0 26px rgba(91,184,245,.35);}
.btn.p{background:var(--btnpink);color:#3a001a;box-shadow:0 5px 0 #b03060,0 0 26px rgba(255,133,170,.35);}
.btn.sm{min-width:clamp(90px,26vw,130px);font-size:clamp(14px,3.8vw,18px);padding:clamp(10px,2.5vw,14px) clamp(16px,4vw,24px);}
.btn:active{box-shadow:0 2px 0 rgba(0,0,0,.3)!important;}

/* ── Choices ── */
.choices{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:6px 0;max-width:min(500px,95vw);}
.cbtn{background:rgba(255,255,255,.1);border:3px solid rgba(255,255,255,.25);border-radius:18px;padding:clamp(12px,3vw,18px) clamp(14px,3.5vw,20px);font-size:clamp(30px,8vw,42px);cursor:pointer;transition:transform .15s,border-color .15s,background .15s;min-width:clamp(88px,24vw,120px);font-family:inherit;color:white;display:flex;flex-direction:column;align-items:center;gap:5px;}
.cbtn span{font-size:clamp(12px,3.2vw,15px);font-weight:600;color:var(--textl);}
.cbtn:active{transform:scale(1.09);}
.cbtn.wrong{border-color:#ff6b6b;background:rgba(255,80,80,.2);animation:shake .4s;}
.cbtn.correct{border-color:var(--green);background:rgba(94,207,143,.22);transform:scale(1.09);}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-9px)}75%{transform:translateX(9px)}}

/* ── Progress bar ── */
.prog-wrap{width:min(300px,85vw);height:10px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden;margin:6px 0;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--gold),var(--accent,#7de8a0));border-radius:5px;transition:width .5s ease;}

/* ── Nav bar (replay + back) ── */
.nav-bar{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:500px;margin-bottom:2px;flex-shrink:0;}
.nav-btn{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:40px;padding:7px 16px;font-size:clamp(13px,3.5vw,16px);font-weight:600;cursor:pointer;color:var(--textl);font-family:inherit;display:flex;align-items:center;gap:5px;transition:background .15s;}
.nav-btn:active{background:rgba(255,255,255,.25);}
/* ── Wish screen ── */
.wish-opts{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
.wish-opt{background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);border-radius:14px;padding:12px 16px;font-size:clamp(16px,4.5vw,20px);cursor:pointer;font-family:inherit;color:white;transition:transform .15s,border-color .15s;}
.wish-opt:active{transform:scale(1.04);border-color:var(--gold);}

/* ── Timer ring ── */
.tring{width:68px;height:68px;margin:6px auto;position:relative;flex-shrink:0;}
.tring svg{transform:rotate(-90deg);}
.tnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:700;color:var(--gold);}

/* ── Move screen ── */
.move-animal{font-size:clamp(64px,18vw,96px);animation:moveBounce .55s cubic-bezier(.33,0,.66,0) infinite;}
@keyframes moveBounce{
  0%  {transform:translateY(0)    scaleX(1)    scaleY(1);}
  15% {transform:translateY(0)    scaleX(1.18) scaleY(.75);}  /* 蹲下压扁 */
  45% {transform:translateY(-48px) scaleX(.88)  scaleY(1.12);} /* 跳到最高 */
  65% {transform:translateY(-48px) scaleX(.88)  scaleY(1.12);}
  80% {transform:translateY(0)    scaleX(1.18) scaleY(.75);}  /* 落地压扁 */
  100%{transform:translateY(0)    scaleX(1)    scaleY(1);}
}
.charge-bar-wrap{width:min(280px,80vw);height:20px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;margin:6px auto;}
.charge-bar{height:100%;background:linear-gradient(90deg,#ff9500,#ffd700);border-radius:10px;transition:width .3s;width:0%;}

/* ── Brush game ── */
.brush-area{width:min(250px,72vw);height:min(155px,44vw);margin:6px auto;background:rgba(255,255,255,.1);border:3px solid rgba(255,255,255,.2);border-radius:20px;position:relative;overflow:hidden;touch-action:none;cursor:none;}
.teeth-img{font-size:clamp(52px,16vw,76px);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:filter .5s;pointer-events:none;}
.dirt{position:absolute;border-radius:50%;background:rgba(120,60,10,.65);pointer-events:none;transition:opacity .35s;}
.brush-cur{position:absolute;font-size:26px;pointer-events:none;transform:translate(-50%,-50%);}
.clean-wrap{width:min(250px,72vw);height:14px;background:rgba(255,255,255,.15);border-radius:7px;margin:5px auto;overflow:hidden;}
.clean-bar{height:100%;background:var(--green);border-radius:7px;width:0%;transition:width .25s;}

/* ── Habit simple ── */
.habit-big{font-size:clamp(64px,18vw,90px);margin:8px 0;}

/* ── Confetti ── */
.celebrate{position:fixed;inset:0;pointer-events:none;z-index:200;}
.cp{position:absolute;top:-30px;font-size:clamp(18px,5vw,26px);animation:cfall var(--dur) ease-in forwards;animation-delay:var(--delay);}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* ── Summary ── */
.sumcard{background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border:2px solid rgba(255,215,0,.3);border-radius:22px;padding:20px;max-width:min(420px,92vw);width:100%;text-align:left;}
.sumrow{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 0;border-bottom:1px solid rgba(255,255,255,.1);font-size:clamp(13px,3.8vw,16px);}
.sumrow:last-child{border-bottom:none;}
.slabel{color:var(--lav);}.sval{font-weight:700;color:var(--warm);text-align:right;max-width:55%;}
.wpills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px;}
.wpill{background:rgba(255,215,0,.2);border:1px solid rgba(255,215,0,.4);border-radius:14px;padding:3px 10px;font-size:13px;font-weight:600;color:var(--warm);}

/* ── Input ── */
.ibox{width:min(320px,88vw);padding:13px 16px;font-size:19px;border-radius:13px;border:3px solid rgba(255,215,0,.5);background:rgba(255,255,255,.08);color:white;font-family:inherit;outline:none;margin:6px 0;}
.ibox:focus{border-color:var(--gold);}

/* ── Shooting stars ── */
.sstar{position:absolute;width:3px;height:3px;background:white;border-radius:50%;animation:shoot var(--dur) ease-in var(--delay) infinite;}
@keyframes shoot{0%{transform:translate(0,0);opacity:1;width:3px}100%{transform:translate(-200px,150px);opacity:0;width:55px}}

/* ── Zap ── */
.zap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:300;pointer-events:none;animation:zapFade .6s forwards;}
@keyframes zapFade{0%{opacity:1;transform:scale(.5)}50%{transform:scale(1.4)}100%{opacity:0;transform:scale(1.6)}}

/* ── Expressions Engine ── */
@keyframes lumiHappy{0%,100%{transform:translateY(0) rotate(-5deg) scale(1)}25%{transform:translateY(-22px) rotate(8deg) scale(1.15)}75%{transform:translateY(-18px) rotate(-8deg) scale(1.12)}}
@keyframes lumiExcited{0%,100%{transform:scale(1) rotate(0)}20%{transform:scale(1.2) rotate(-10deg)}40%{transform:scale(1.2) rotate(10deg)}60%{transform:scale(1.15) rotate(-8deg)}80%{transform:scale(1.15) rotate(8deg)}}
@keyframes lumiShy{0%,100%{transform:scale(1) rotate(-5deg)}50%{transform:scale(0.88) rotate(-15deg) translateX(-8px)}}
@keyframes lumiSleepy{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(6px) rotate(-12deg)}}
@keyframes lumiSurprise{0%{transform:scale(1)}15%{transform:scale(1.35) rotate(5deg)}30%{transform:scale(0.95)}45%{transform:scale(1.2) rotate(-5deg)}100%{transform:scale(1) rotate(-5deg)}}
.lumi-star.happy   {animation:lumiHappy 1s ease-in-out infinite;}
.lumi-star.excited {animation:lumiExcited .7s ease-in-out infinite;}
.lumi-star.shy     {animation:lumiShy 2s ease-in-out infinite;}
.lumi-star.sleepy  {animation:lumiSleepy 2.5s ease-in-out infinite;}
.lumi-star.surprise{animation:lumiSurprise .6s ease-out forwards;}

/* ── Storybook ── */
.storybook-screen{background:linear-gradient(160deg,#0a0520 0%,#1a0a30 100%);}
.story-page{display:flex;flex-direction:column;align-items:center;justify-content:center;width:100%;max-width:420px;gap:8px;}
.story-scene{font-size:clamp(64px,18vw,96px);margin:4px 0;transition:all .5s ease;}
.story-scene.pop{animation:scenePop .4s ease-out;}
.story-text{background:rgba(255,255,255,.1);backdrop-filter:blur(12px);border:2px solid rgba(255,255,255,.2);border-radius:20px;padding:16px 22px;font-size:clamp(18px,5vw,24px);line-height:1.7;font-weight:600;color:var(--white);max-width:min(400px,92vw);text-align:center;}
.story-page-num{font-size:13px;color:rgba(255,255,255,.4);margin-top:2px;}
/* drag target */
.drag-target{width:clamp(80px,22vw,110px);height:clamp(80px,22vw,110px);border:3px dashed rgba(255,255,255,.4);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:clamp(36px,10vw,52px);transition:border-color .3s,background .3s;margin:8px;}
.drag-target.over{border-color:var(--gold);background:rgba(255,215,0,.15);}
.drag-target.done{border-color:var(--green);background:rgba(94,207,143,.15);}
.drag-item{font-size:clamp(44px,12vw,64px);cursor:grab;display:inline-block;transition:transform .15s;touch-action:none;}
.drag-item:active{transform:scale(1.15);}
/* bedtime fade */
.bedtime-overlay{position:fixed;inset:0;background:black;pointer-events:none;z-index:150;opacity:0;transition:opacity 3s ease;}
.bedtime-overlay.fade{opacity:.92;}
/* hug target */
.hug-target{font-size:clamp(72px,20vw,100px);cursor:pointer;transition:transform .2s;display:inline-block;}
.hug-target:active,.hug-target.hugged{transform:scale(1.25);filter:drop-shadow(0 0 20px #ff9eb5);}
/* tap light */
.tap-light{font-size:clamp(72px,20vw,100px);cursor:pointer;filter:grayscale(1) brightness(.4);transition:filter .6s;}
.tap-light.lit{filter:grayscale(0) brightness(1) drop-shadow(0 0 24px #ffd700);}

.etitle{font-size:clamp(13px,3.8vw,17px);color:var(--lav);letter-spacing:2px;font-weight:600;margin-bottom:2px;}
.row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
h1{font-size:clamp(32px,8.5vw,48px);font-weight:800;line-height:1.2;}
h2{font-size:clamp(20px,5.5vw,28px);font-weight:700;}
</style>
</head>
<body>
<div class="stars-bg" id="starsBg"></div>
<div class="celebrate" id="celebrate"></div>
<div class="theme-bg" id="themeBg"></div>

<!-- ══════════ SETUP ══════════ -->
<div class="screen active" id="s-setup">
  <div class="lumi-wrap"><div class="glow"></div><div class="lumi-star xl">⭐</div></div>
  <h1 style="color:var(--gold);margin:8px 0;">Lumi 小星星</h1>
  <div class="bubble">告诉我你们叫什么名字！🌟</div>
  <input class="ibox" id="n1" type="text" placeholder="大宝的名字（例如：Mira）">
  <input class="ibox" id="n2" type="text" placeholder="小宝的名字（例如：妹妹）">
  <button class="btn y" onclick="startSetup()">出发！🚀</button>
</div>

<!-- ══════════ ADVENTURE SELECT ══════════ -->
<div class="screen" id="s-select">
  <div class="lumi-wrap"><div class="glow"></div><div class="lumi-star lg">⭐</div></div>
  <div class="bubble" id="selectGreet"></div>
  <p style="color:var(--lav);font-size:clamp(14px,4vw,18px);margin:4px 0;">今天选哪个冒险？</p>
  <div id="adventureList" style="display:flex;flex-direction:column;gap:10px;width:min(340px,90vw);margin-top:6px;"></div>
</div>

<!-- ══════════ MAIN ADVENTURE SCREEN ══════════ -->
<div class="screen" id="s-adventure">
  <!-- nav bar: back + title/progress + replay -->
  <div class="nav-bar">
    <button class="nav-btn" onclick="goBack()">🔙 返回</button>
    <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:center;margin:0 6px;">
      <div class="etitle" id="adventureTitle" style="white-space:nowrap;margin:0;">冒险中</div>
      <div class="prog-wrap" style="flex:1;max-width:120px;margin:0;"><div class="prog-bar" id="progBar" style="width:0%"></div></div>
    </div>
    <button class="nav-btn" onclick="replayLine()">🔊 再听一遍</button>
  </div>

  <!-- Lumi -->
  <div class="lumi-wrap"><div class="glow"></div><div class="lumi-star md" id="lumiStar">⭐</div></div>

  <!-- scene image -->
  <div class="scene" id="sceneImg"></div>

  <!-- lumi speech -->
  <div class="bubble" id="lumiSpeech"></div>

  <!-- dynamic content area -->
  <div id="contentArea" style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:500px;"></div>

  <!-- action area -->
  <div id="actionArea" style="display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:4px;"></div>
</div>

<!-- ══════════ SUMMARY ══════════ -->
<div class="screen" id="s-summary">
  <div style="position:absolute;inset:0;overflow:hidden;" id="shootWrap"></div>
  <div class="lumi-wrap" style="z-index:2"><div class="glow"></div><div class="lumi-star lg">⭐</div></div>
  <h2 style="color:var(--gold);margin:8px 0;z-index:2;">今天的收获 🌟</h2>
  <div class="sumcard" id="sumCard" style="z-index:2;"></div>
  <button class="btn p" onclick="startStorybook('bunny-home')" id="sbBtn" style="margin-top:10px;z-index:2;display:none;">📚 读跳跳的故事！</button>
  <button class="btn y" onclick="goHome()" style="margin-top:8px;z-index:2;">再来一个冒险！⭐</button>
</div>

<!-- ══════════ STORYBOOK ══════════ -->
<div class="screen storybook-screen" id="s-storybook">
  <div class="nav-bar">
    <button class="nav-btn" onclick="sbBack()">🔙 返回</button>
    <div style="display:flex;align-items:center;gap:6px;flex:1;justify-content:center;margin:0 6px;">
      <div class="etitle" id="sbTitle" style="white-space:nowrap;margin:0;">📚 故事</div>
      <div class="prog-wrap" style="flex:1;max-width:120px;margin:0;"><div class="prog-bar" id="sbProgBar" style="width:0%"></div></div>
    </div>
    <button class="nav-btn" onclick="sbReplay()">🔊 再听一遍</button>
  </div>
  <div class="lumi-wrap"><div class="glow"></div><div class="lumi-star md" id="sbLumiStar">⭐</div></div>
  <div id="sbContent" style="display:flex;flex-direction:column;align-items:center;width:100%;max-width:440px;gap:8px;"></div>
  <div id="sbAction" style="display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:6px;"></div>
</div>

<!-- ══════════ BEDTIME ══════════ -->
<div class="bedtime-overlay" id="bedtimeOverlay"></div>

<script>
// ══════════════════════════════════════════════════════════
//  ADVENTURES — embedded JSON (no server needed)

// ── NAV: Replay + Back ──────────────────────────────────────
function replayLine(){
  if(currentStepText) speak(currentStepText);
}
function goBack(){
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  if(moveTimer){ clearInterval(moveTimer); moveTimer=null; }
  synth.cancel();
  // pop current screen, then pop previous to re-run it
  stepHistory.pop(); // remove current
  const prev = stepHistory.pop(); // get previous
  stepIdx = (prev !== undefined) ? prev : 0;
  runStep();
}

const synth = window.speechSynthesis;
let voices = [];
let zhVoice = null;
let enVoice = null;

function loadVoices(){
  voices = synth.getVoices();
  // Pick best Chinese voice: prefer female/Tingting/Meijia/Sinji, avoid male
  const zhPrefer = ['Tingting','Meijia','Sinji','Yu-shu','Tian-Tian',
                    'Li-Mu','Yuna','Kyoko','Sin-ji','Ting-Ting'];
  const zhAll = voices.filter(v=>
    v.lang.startsWith('zh')||v.lang.startsWith('cmn')||v.lang.startsWith('yue'));
  // try preferred names first
  zhVoice = zhAll.find(v=>zhPrefer.some(n=>v.name.includes(n)))
          || zhAll.find(v=>/female|woman|girl/i.test(v.name))
          || zhAll[0] || null;
  // English: prefer female
  const enAll = voices.filter(v=>v.lang.startsWith('en'));
  enVoice = enAll.find(v=>['Samantha','Karen','Moira','Tessa','Fiona',
                            'Veena','Allison','Ava','Victoria','Susan',
                            'Zoe'].some(n=>v.name.includes(n)))
           || enAll.find(v=>/female|woman/i.test(v.name))
           || enAll[0] || null;
}
synth.onvoiceschanged = loadVoices;
loadVoices();

function speak(txt, rate=1.05, pitch=1.4, onEnd=null){
  // rate 1.05 = slightly fast like a child; pitch 1.4 = higher, childlike
  synth.cancel(); if(!txt) return;
  const u = new SpeechSynthesisUtterance(txt);
  u.rate=rate; u.pitch=pitch; u.volume=1;
  if(zhVoice) u.voice = zhVoice;
  if(onEnd) u.onend = onEnd;
  synth.speak(u);
}
function speakThen(txt, delayAfter, fn){
  speak(txt, 1.05, 1.4, ()=>{ setTimeout(fn, delayAfter); });
}
function speakEn(txt, onEnd=null){
  synth.cancel();
  const u = new SpeechSynthesisUtterance(txt);
  u.rate=0.8; u.pitch=1.35; u.volume=1;
  if(enVoice) u.voice=enVoice;
  if(onEnd) u.onend = onEnd;
  synth.speak(u);
}

function timerRing(s,max){
  const r=30,cx=36,cy=36,circ=2*Math.PI*r,dash=circ*(s/max);
  return `<div class="tring"><svg viewBox="0 0 72 72" width="72" height="72">

}

function startAdventure(id){
  currentAdventure = ADVENTURES[id];
  stepIdx = 0;
  session = { words:[], answers:0, habitDone:false, adventureId:id };
  stepHistory = [];
  setTheme(currentAdventure);
  document.getElementById('adventureTitle').textContent = currentAdventure.theme;
  show('s-adventure');
  runStep();
}

// ══════════════════════════════════════════════════════════
//  FLOW ENGINE
// ══════════════════════════════════════════════════════════
function runStep(){
  if(autoTimer){ clearTimeout(autoTimer); autoTimer=null; }
  if(moveTimer){ clearInterval(moveTimer); moveTimer=null; }

  const steps = currentAdventure.steps;
  if(stepIdx >= steps.length){ showSummary(); return; }

  const step = steps[stepIdx];
  updateProgress();
  stepHistory.push(stepIdx); // record for goBack

  // clear areas
  document.getElementById('contentArea').innerHTML='';
  document.getElementById('actionArea').innerHTML='';

  // update scene (renderers own the speak call)
  currentStepText = step.lumi||'';
  document.getElementById('sceneImg').textContent = step.image||'';
  document.getElementById('lumiSpeech').textContent = step.lumi||'';

  // dispatch by stepType
  switch(step.stepType){
    case 'talk':      renderTalk(step); break;
    case 'choice':    renderChoice(step); break;
    case 'word':      renderWord(step); break;
    case 'move':      renderMove(step); break;
    case 'realworld': renderRealworld(step); break;
    case 'habit':     renderHabit(step); break;
    case 'value':     renderValue(step); break;
    case 'goodbye':   renderGoodbye(step); break;
    default:          nextStep();
  }
}

function nextStep(){
  stepIdx++;
  setTimeout(()=>runStep(), 300);
}

// TALK — speak, then autoNext after speech ends + 1.5s grace
function renderTalk(step){
  if(step.autoNext){
    speak(step.lumi||'', 0.88, 1.1, ()=>{
      autoTimer = setTimeout(()=>nextStep(), 1500);
    });
  } else {
    speak(step.lumi||'');
    setAction(`<button class="btn g" onclick="nextStep()">好！继续！▶️</button>`);
  }
}

// CHOICE
function renderChoice(step){
  speak(step.lumi||'');
  const ca = document.getElementById('contentArea');
  const choicesEl = document.createElement('div');
  choicesEl.className='choices';
  step.choices.forEach(c=>{
    const b=document.createElement('button'); b.className='cbtn';
    b.innerHTML=`${c.emoji}<span>${c.label}</span>`;
    b.onclick=()=>handleChoice(b,c,choicesEl,step);
    choicesEl.appendChild(b);
  });
  ca.appendChild(choicesEl);
}
function handleChoice(btn,choice,choicesEl,step){
  choicesEl.querySelectorAll('.cbtn').forEach(b=>b.onclick=null);
  if(choice.correct){
    btn.classList.add('correct'); confetti(); session.answers++;
    setLumiMood('excited');
    document.getElementById('lumiSpeech').textContent = choice.reaction;
    speak(choice.reaction, 0.88, 1.1, ()=>{
      setTimeout(()=>{
        setAction(`<button class="btn y" onclick="nextStep()">继续！▶️</button>`);
      }, 600);
    });
  } else {
    btn.classList.add('wrong');
    setLumiMood('shy');
    document.getElementById('lumiSpeech').textContent = choice.reaction;
    speak(choice.reaction);
    setTimeout(()=>{
      btn.classList.remove('wrong');
      choicesEl.querySelectorAll('.cbtn').forEach(b=>{
        const c2=step.choices.find(x=>x.label===b.querySelector('span').textContent);
        if(c2) b.onclick=()=>handleChoice(b,c2,choicesEl,step);
      });
      setLumiMood('happy');
      document.getElementById('lumiSpeech').textContent = step.lumi;
      speak(step.lumi);
    },1500);
  }
}

// WORD
function renderWord(step){
  const w = step.word;
  addWord(`${w.zh} / ${w.en}`);
  const ca = document.getElementById('contentArea');
  ca.innerHTML=`<div class="word-card">
    <div class="word-emoji">${step.image}</div>
    <div class="word-zh">${w.zh}</div>
    <div class="word-en">${w.en}</div>
  </div>`;
  // speak lumi line → EN word → EN word again → autoNext
  speak(step.lumi||'', 0.88, 1.1, ()=>{
    setTimeout(()=>{
      speakEn(w.en, ()=>{
        setTimeout(()=>{
          speakEn(w.en, ()=>{
            if(step.autoNext){
              autoTimer = setTimeout(()=>nextStep(), 1000);
            }
          });
        }, 700);
      });
    }, 600);
  });
}

// MOVE
function renderMove(step){
  const mv = step.move;
  const ca = document.getElementById('contentArea');
  ca.innerHTML=`
    <div class="move-animal">${mv.animal||'⚡'}</div>
    <p style="font-size:clamp(18px,5vw,24px);color:var(--warm);font-weight:700;margin:4px 0">${mv.action}</p>
    <p style="font-size:clamp(14px,4vw,18px);color:var(--lav);">${mv.en}</p>
    <div class="charge-bar-wrap"><div class="charge-bar" id="moveBar"></div></div>
    <div id="moveTimer"></div>`;

  // speak lumi intro, then speak action instruction
  speak(step.lumi||'', 0.88, 1.1, ()=>{
    setTimeout(()=>speak(mv.action, 0.85, 1.05), 300);
  });

  let s = mv.secs;
  document.getElementById('moveTimer').innerHTML = timerRing(s, mv.secs);
  moveTimer = setInterval(()=>{
    s--;
    const pct = Math.min(100,((mv.secs-s)/mv.secs)*100);
    const bar = document.getElementById('moveBar');
    if(bar) bar.style.width=pct+'%';
    const mt = document.getElementById('moveTimer');
    if(s<=0){
      clearInterval(moveTimer);
      if(mt) mt.innerHTML='';
      zap(); confetti();
      document.getElementById('lumiSpeech').textContent='魔法充满了！⚡ 谢谢你们！';
      speak('魔法充满了！谢谢你们！');
      setAction(`<button class="btn y" onclick="nextStep()">继续！▶️</button>`);
    } else {
      if(mt) mt.innerHTML=timerRing(s,mv.secs);
    }
  },1000);
  // also show skip after 3 sec
  setTimeout(()=>{
    const aa=document.getElementById('actionArea');
    if(aa && !aa.innerHTML){
      aa.innerHTML=`<button class="btn b sm" onclick="nextStep()" style="opacity:.6;">跳过</button>`;
    }
  },3000);
}

// REALWORLD
function renderRealworld(step){
  speak(step.lumi||'');
  const task = step.task;
  const ca = document.getElementById('contentArea');
  ca.innerHTML=`
    <div style="font-size:clamp(52px,15vw,76px);margin:6px 0">${task.emoji}</div>
    <p style="font-size:clamp(18px,5vw,24px);font-weight:700;color:var(--warm);margin:4px 0">${task.text}</p>
    <p style="font-size:clamp(14px,4vw,17px);color:var(--lav);">${task.en}</p>
    <div id="rwTimer"></div>`;

  let s = task.secs;
  document.getElementById('rwTimer').innerHTML = timerRing(s, task.secs);
  moveTimer = setInterval(()=>{
    s--;
    const rt = document.getElementById('rwTimer');
    if(s<=0){
      clearInterval(moveTimer);
      if(rt) rt.innerHTML='';
      setAction(`
        <button class="btn g" onclick="rwDone(true)"  >找到了！🎉</button>
        <button class="btn b sm" onclick="rwDone(false)">没找到</button>`);
      speak('找到了吗？');
    } else {
      if(rt) rt.innerHTML=timerRing(s,task.secs);
    }
  },1000);
  // show done/skip early
  setAction(`
    <button class="btn g" onclick="rwDone(true)"  >找到了！🎉</button>
    <button class="btn b sm" onclick="rwDone(false)">跳过</button>`);
}
function rwDone(found){
  clearInterval(moveTimer);
  if(found){
    confetti();
    speakThen('哇！你们太棒了！找到了！', 800, ()=>nextStep());
  } else {
    speakThen('没关系！下次再找！', 600, ()=>nextStep());
  }
}

// HABIT
function renderHabit(step){
  speak(step.lumi||'');
  const habit = step.habit;
  session.habitDone = false;

  if(habit.brushGame){
    // full brush mini-game
    document.getElementById('lumiSpeech').textContent = step.lumi;
    const ca = document.getElementById('contentArea');
    ca.innerHTML=`
      <div class="brush-area" id="bArea">
        <div class="teeth-img" id="teethImg">😬</div>
        <div class="brush-cur" id="bCur" style="left:-99px;top:-99px">🪥</div>
      </div>
      <div class="clean-wrap"><div class="clean-bar" id="cleanBar"></div></div>
      <p style="font-size:clamp(13px,3.8vw,16px);color:var(--lav);margin:3px 0;" id="brushMsg">用手指来回刷！</p>`;
    let cleanPct=0, brushDone=false;
    const area=document.getElementById('bArea');
    const dirtySpots=[];
    area.querySelectorAll('.dirt').forEach(d=>d.remove());
    for(let i=0;i<6;i++){
      const d=document.createElement('div'); d.className='dirt';
      const w=16+~~(Math.random()*18), h=13+~~(Math.random()*12);
      d.style.cssText=`width:${w}px;height:${h}px;left:${8+~~(Math.random()*72)}%;top:${28+~~(Math.random()*42)}%;opacity:1;`;
      area.appendChild(d); dirtySpots.push(d);
    }
    const doBrushMove=e=>{
      if(brushDone)return;
      const rect=area.getBoundingClientRect();
      const x=e.clientX-rect.left, y=e.clientY-rect.top;
      document.getElementById('bCur').style.left=x+'px';
      document.getElementById('bCur').style.top=y+'px';
      dirtySpots.forEach(d=>{
        if(parseFloat(d.style.opacity)<0.1)return;
        const dl=parseFloat(d.style.left)/100*area.offsetWidth;
        const dt=parseFloat(d.style.top)/100*area.offsetHeight;
        if(x>dl&&x<dl+d.offsetWidth&&y>dt&&y<dt+d.offsetHeight){
          d.style.opacity='0';
          cleanPct=Math.min(100,cleanPct+17);
          document.getElementById('cleanBar').style.width=cleanPct+'%';
          if(cleanPct>=100){
            brushDone=true; session.habitDone=true;
            document.getElementById('teethImg').textContent='😁';
            document.getElementById('teethImg').style.filter='drop-shadow(0 0 12px #ffd700)';
            document.getElementById('brushMsg').textContent='刷干净啦！';
            confetti(); speak('刷干净了！太棒了！现在你们也去刷牙吧！刷完回来！');
            document.getElementById('lumiSpeech').textContent='刷干净了！太棒了！你们也去刷吧！';
            setAction(`
              <button class="btn g" onclick="showBrushWish()">我刷完了！🦷</button>
              <button class="btn b sm" onclick="nextStep()">下次刷</button>`);
          }
        }
      });
    };
    area.onpointermove=e=>{ if(e.buttons===0)return; doBrushMove(e); };
    area.onpointerdown=e=>{ area.setPointerCapture(e.pointerId); doBrushMove(e); };
  } else {
    // simple habit: show icon + confirm
    const ca = document.getElementById('contentArea');
    ca.innerHTML=`<div class="habit-big">${habit.emoji}</div>
      <p style="font-size:clamp(18px,5vw,24px);font-weight:700;color:var(--warm)">${habit.text}</p>`;
    setAction(`
      <button class="btn g" onclick="habitDone(true)">做到了！✓</button>
      <button class="btn b sm" onclick="habitDone(false)">等会儿做</button>`);
  }
}
function habitDone(done){
  if(done){
    confetti(); session.habitDone=true; speak('太棒了！做到了！Lumi 要实现一个小愿望！');
    setAction(`
      <p style="font-size:clamp(15px,4.2vw,19px);color:var(--gold);font-weight:700;margin:6px 0">✨ 选一个愿望！</p>
      <div class="wish-opts" style="max-width:min(320px,88vw);">
        <button class="wish-opt" onclick="grantWish('再做一次！','⚡')">⚡ 再做一次！</button>
        <button class="wish-opt" onclick="grantWish('Lumi 给你们一个大大的星星抱！','⭐')">⭐ Lumi 的星星抱！</button>
        <button class="wish-opt" onclick="grantWish('继续冒险！','🚀')">🚀 继续冒险！</button>
      </div>`);
  } else {
    speak('没关系，等会儿记得哦！');
    setTimeout(()=>nextStep(),1000);
  }
}

//  STORYBOOK ENGINE
// ══════════════════════════════════════════════════════════
let sbPages = [];
let sbIdx = 0;
let sbHistory = [];
let sbCurrentText = '';
let sbAutoTimer = null;
let sbMoveTimer = null;
let isDragging = false;
let dragEl = null;

function startStorybook(storyId){
  // build story with real names
  const story = getBunnyStory(N1, N2);
  sbPages = story.pages;
  sbIdx = 0; sbHistory = [];
  document.getElementById('sbTitle').textContent = '📚 ' + story.title;
  show('s-storybook');
  runSbPage();
}

function runSbPage(){
  if(sbAutoTimer){ clearTimeout(sbAutoTimer); sbAutoTimer=null; }
  if(sbMoveTimer){ clearInterval(sbMoveTimer); sbMoveTimer=null; }
  if(sbIdx >= sbPages.length){ goHome(); return; }

  const page = sbPages[sbIdx];
  sbHistory.push(sbIdx);
  sbCurrentText = page.text||'';

  // progress
  document.getElementById('sbProgBar').style.width = (sbIdx/sbPages.length*100)+'%';

  // Lumi mood
  setLumiMood(page.mood||'happy', 'sbLumiStar');

  // clear
  document.getElementById('sbContent').innerHTML='';
  document.getElementById('sbAction').innerHTML='';

  // speak
  speak(page.text||'');

  // render
  switch(page.pageType){
    case 'narrate': renderSbNarrate(page); break;
    case 'jump':    renderSbJump(page); break;
    case 'drag':    renderSbDrag(page); break;
    case 'hug':     renderSbHug(page); break;
    case 'tap':     renderSbTap(page); break;
    case 'shout':   renderSbShout(page); break;
    case 'brush':   renderSbBrush(page); break;
    case 'finale':  renderSbFinale(page); break;
    default: sbNext();
  }
}

function sbNext(){
  sbIdx++;
  setTimeout(()=>runSbPage(), 300);
}
function sbBack(){
  if(sbAutoTimer){ clearTimeout(sbAutoTimer); sbAutoTimer=null; }
  if(sbMoveTimer){ clearInterval(sbMoveTimer); sbMoveTimer=null; }
  synth.cancel();
  sbHistory.pop();
  const prev = sbHistory.pop();
  sbIdx = (prev!==undefined)?prev:0;
  runSbPage();
}
function sbReplay(){ if(sbCurrentText) speak(sbCurrentText); }

function sbSetAction(html){ document.getElementById('sbAction').innerHTML=html; }

function sbScene(emoji, cls=''){
  return `<div class="story-scene ${cls}" id="sbScene">${emoji}</div>`;
}
function sbTextBox(text){
  return `<div class="story-text">${text}</div>`;
}

// ── NARRATE ──
function renderSbNarrate(page){
  const c=document.getElementById('sbContent');
  c.innerHTML=sbScene(page.scene)+sbTextBox(page.text);
  if(page.autoNext){
    sbAutoTimer=setTimeout(()=>sbNext(), page.duration||4000);
  } else {
    sbSetAction(`<button class="btn g" onclick="sbNext()">继续 ▶️</button>`);
  }
}

// ── JUMP ──
function renderSbJump(page){
  const c=document.getElementById('sbContent');
  c.innerHTML=sbScene(page.scene,'pop')+sbTextBox(page.text)+
    `<p style="font-size:clamp(16px,4.5vw,20px);color:var(--warm);font-weight:700;margin:4px 0">${page.action}</p>`;
  let s=page.secs||8;

  sbMoveTimer=setInterval(()=>{

      clearInterval(sbMoveTimer);
      if(t) t.innerHTML='';
      confetti();
      speak('跳过去啦！好厉害！');
      sbSetAction(`<button class="btn y" onclick="sbNext()">继续 ▶️</button>`);
    } else {
      if(t) t.innerHTML=timerRing(s,page.secs);
    }
  },1000);
}

// ── DRAG ──
function renderSbDrag(page){
  const c=document.getElementById('sbContent');
  c.innerHTML=sbScene(page.scene,'pop')+sbTextBox(page.text)+`
    <p style="font-size:clamp(15px,4vw,18px);color:var(--lav);margin:4px 0">${page.instruction}</p>
    <div style="display:flex;align-items:center;gap:24px;margin:8px 0">
      <span class="drag-item" id="dragItem" draggable="true">${page.dragEmoji}</span>
      <span style="font-size:28px;color:var(--lav)">→</span>
      <div class="drag-target" id="dragTarget">${page.targetEmoji}</div>
    </div>`;

  // touch drag
  const item=document.getElementById('dragItem');
  const target=document.getElementById('dragTarget');

  // pointer events for mobile
  item.onpointerdown=e=>{
    item.setPointerCapture(e.pointerId);
    item.style.opacity='.7';
    isDragging=true;
  };
  item.onpointermove=e=>{
    if(!isDragging) return;
    item.style.transform=`translate(${e.movementX}px,${e.movementY}px) scale(1.2)`;
    // check overlap with target
    const ir=item.getBoundingClientRect(), tr=target.getBoundingClientRect();
    const overlap=!(ir.right<tr.left||ir.left>tr.right||ir.bottom<tr.top||ir.top>tr.bottom);
    target.classList.toggle('over', overlap);
  };
  item.onpointerup=e=>{
    isDragging=false;
    item.style.opacity='1'; item.style.transform='';
    const tr=target.getBoundingClientRect();
    const cx=e.clientX, cy=e.clientY;
    if(cx>tr.left&&cx<tr.right&&cy>tr.top&&cy<tr.bottom){
      target.classList.remove('over'); target.classList.add('done');
      target.innerHTML='🦆🥕';
      confetti(); speak('分享了！小鸭子好开心！');
      item.style.display='none';
      sbSetAction(`<button class="btn y" onclick="sbNext()">继续 ▶️</button>`);
    } else {
      target.classList.remove('over');
    }
  };
  // also allow tap on target directly
  target.onclick=()=>{
    target.classList.add('done'); target.innerHTML='🦆🥕';
    confetti(); speak('分享了！小鸭子好开心！');
    item.style.display='none';
    sbSetAction(`<button class="btn y" onclick="sbNext()">继续 ▶️</button>`);
  };
}

  speak('灯亮了！找到家啦！');
  document.getElementById('sbScene').textContent='🏠✨';
  sbSetAction(`<button class="btn y" onclick="sbNext()">继续 ▶️</button>`);
}

// ── SHOUT ──
function renderSbShout(page){
  const c=document.getElementById('sbContent');
  c.innerHTML=sbScene(page.scene,'pop')+sbTextBox(page.text)+`
    <div style="font-size:clamp(22px,6vw,30px);font-weight:800;color:var(--gold);margin:8px 0;line-height:1.4">${page.shout}</div>`;
  speak(page.text, 1.05, 1.4, ()=>{
    setTimeout(()=>speak(page.shout, 0.8, 1.5), 400);
  });
  sbSetAction(`<button class="btn y" onclick="sbNext()">我说了！✓</button>`);
}

// ── BRUSH (simple, no game — just do it together) ──
function renderSbBrush(page){
  const c=document.getElementById('sbContent');
  c.innerHTML=sbScene(page.scene)+sbTextBox(page.text)+`
    <div style="font-size:clamp(52px,15vw,72px);margin:6px 0;animation:moveBounce 1s ease-in-out infinite">🪥</div>`;
  sbSetAction(`
    <button class="btn g" onclick="showSbBrushWish()">我刷完了！🦷</button>
    <button class="btn b sm" onclick="sbNext()">下次刷</button>`);
}
function showSbBrushWish(){
  confetti(); speak('太棒了！刷得真干净！');
  sbSetAction(`
    <p style="font-size:clamp(15px,4.2vw,18px);color:var(--gold);font-weight:700;margin:4px 0">✨ 选一个愿望！</p>
    <div class="wish-opts" style="max-width:min(300px,86vw);">
      <button class="wish-opt" onclick="grantWish('再看一次跳跳！','🐰')">🐰 再看一次跳跳！</button>
      <button class="wish-opt" onclick="grantWish('Lumi的星星抱！','⭐')">⭐ Lumi的星星抱！</button>
      <button class="wish-opt" onclick="sbNext()">🌙 直接看结局！</button>
    </div>`);
}

// ── FINALE ──
function renderSbFinale(page){
  const c=document.getElementById('sbContent');
  c.innerHTML=`
    <div class="story-text">${page.text}</div>
    <div id="lumiFinale" style="font-size:clamp(64px,18vw,96px);margin:12px 0;transition:all 3s ease;filter:drop-shadow(0 0 20px #ffd700)">⭐</div>`;
  setLumiMood('sleepy','sbLumiStar');

  // speak, then Lumi flies away
  speak(page.text, 0.78, 1.05, ()=>{
    setTimeout(()=>{
      speak('晚安。', 0.7, 1.0, ()=>{
        // star flies up and fades
        setTimeout(()=>{
          const star=document.getElementById('lumiFinale');
          if(star){ star.style.transform='translateY(-200px) scale(0.1)'; star.style.opacity='0'; }
          // darken screen
          setTimeout(()=>{
            document.getElementById('bedtimeOverlay').classList.add('fade');
          }, 2000);
        }, 800);
      });
    }, 1000);
  });

  // no buttons — screen just fades to black
  sbSetAction('');
}

// input polish
document.querySelectorAll('input').forEach(i=>{
  i.addEventListener('focus',()=>i.style.borderColor='var(--gold)');
  i.addEventListener('blur', ()=>i.style.borderColor='rgba(255,215,0,.5)');
});
document.getElementById('n1').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('n2').focus(); });
document.getElementById('n2').addEventListener('keydown',e=>{ if(e.key==='Enter') startSetup(); });

init();
</script>
</body>
</html>
